[mypy]
python_version = 3.10
files = src/echovec
ignore_missing_imports = True
warn_redundant_casts = True
no_implicit_optional = True

# The autograd core leans on dynamic NumPy shapes and stores its backward rules
# in untyped closures; checking inside those adds noise without catching bugs.
check_untyped_defs = False
disallow_untyped_defs = False

# NumPy ships PEP-695 stubs that only parse under a 3.12 target; treat the
# package as untyped so type-checking stays stable across Python versions.
[mypy-numpy.*]
follow_imports = skip
follow_imports_for_stubs = True

# Inside an op's ``_backward`` closure the engine guarantees ``out.grad`` is set
# before the closure runs, but that invariant is not expressible to the checker.
[mypy-echovec.autograd.tensor]
disable_error_code = union-attr, index

[mypy-echovec.autograd.functional]
disable_error_code = union-attr, index

[mypy-echovec.nn.conv]
disable_error_code = union-attr
